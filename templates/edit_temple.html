<!DOCTYPE html>
<html>

<head>
    <title>Edit Temple</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center text-warning">
✏️ Edit Temple
</h2>

<form method="POST">

<div class="mb-3">
<label>Temple Name</label>
<input type="text" name="temple_name" class="form-control"
value="{{ temple[1] }}" required>
</div>

<div class="mb-3">
<label>State</label>
<input type="text" name="state" class="form-control"
value="{{ temple[2] }}" required>
</div>

<div class="mb-3">
<label>City</label>
<input type="text" name="city" class="form-control"
value="{{ temple[3] }}" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description"
class="form-control">{{ temple[4] }}</textarea>
</div>

<div class="mb-3">
<label>Opening Time</label>
<input type="text" name="opening_time"
class="form-control"
value="{{ temple[5] }}">
</div>

<div class="mb-3">
<label>Closing Time</label>
<input type="text" name="closing_time"
class="form-control"
value="{{ temple[6] }}">
</div>

<div class="mb-3">
<label>Image Path</label>
<input type="text" name="image"
class="form-control"
value="{{ temple[7] }}">
</div>

<div class="mb-3">
<label>Contact</label>
<input type="text" name="contact"
class="form-control"
value="{{ temple[8] }}">
</div>

<button class="btn btn-success">
Update Temple
</button>

<a href="/admin/view_temples"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>
</html>
