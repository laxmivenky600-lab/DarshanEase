<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Temple - Admin Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #f3f4f6;
        }
        .form-card {
            max-width: 700px;
            margin: 0 auto;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <!-- Sticky Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-premium sticky-top py-3">
        <div class="container">
            <a class="navbar-brand-premium d-flex align-items-center" href="/admin">
                <i class="fa-solid fa-user-shield me-2 text-warning"></i>
                <span>DarshanHub Admin</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link text-dark fw-medium px-3" href="/admin"><i class="fa-solid fa-chart-line me-1 text-warning"></i> Statistics</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-medium px-3" href="/admin/users"><i class="fa-solid fa-users me-1 text-warning"></i> Users</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-medium px-3" href="/admin/bookings"><i class="fa-solid fa-receipt me-1 text-warning"></i> Bookings</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-medium px-3 active" href="/admin/view_temples"><i class="fa-solid fa-church me-1 text-warning"></i> Temples</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-medium px-3" href="/admin/view_feedback"><i class="fa-solid fa-comments me-1 text-warning"></i> Feedback</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="/" class="btn-premium"><i class="fa-solid fa-house"></i> Public Home</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <section class="py-5">
        <div class="container py-3">
            <div class="card border-0 shadow-sm p-5 bg-white form-card" data-aos="zoom-in">
                <h3 class="fw-bold mb-1 text-dark heritage-font text-center"><i class="fa-solid fa-circle-plus text-warning me-2"></i> Add Temple Destination</h3>
                <p class="text-muted text-center mb-5">Fill in database details to append new heritage temple to the system listing directory.</p>
                
                <form method="POST" class="text-start">
                    <!-- Temple name -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Temple Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-church"></i></span>
                            <input type="text" name="temple_name" class="form-control border-start-0 custom-input" placeholder="e.g. Tirumala Balaji Temple" required>
                        </div>
                    </div>

                    <!-- State & City -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6 col-12">
                            <label class="form-label fw-semibold text-dark">State</label>
                            <input type="text" name="state" class="form-control custom-input" placeholder="e.g. Andhra Pradesh" required>
                        </div>
                        <div class="col-md-6 col-12">
                            <label class="form-label fw-semibold text-dark">City</label>
                            <input type="text" name="city" class="form-control custom-input" placeholder="e.g. Tirupati" required>
                        </div>
                    </div>

                    <!-- Timings Grid -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6 col-12">
                            <label class="form-label fw-semibold text-dark">Opening Time</label>
                            <input type="text" name="opening_time" class="form-control custom-input" placeholder="e.g. 06:00 AM">
                        </div>
                        <div class="col-md-6 col-12">
                            <label class="form-label fw-semibold text-dark">Closing Time</label>
                            <input type="text" name="closing_time" class="form-control custom-input" placeholder="e.g. 09:00 PM">
                        </div>
                    </div>

                    <!-- Image URL / Path -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Image URL or Static Path</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-image"></i></span>
                            <input type="text" name="image" class="form-control border-start-0 custom-input" placeholder="e.g. images/tirumala1.jpg">
                        </div>
                    </div>

                    <!-- Contact Number -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Contact Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-phone"></i></span>
                            <input type="text" name="contact" class="form-control border-start-0 custom-input" placeholder="e.g. +91 877-2277777">
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Description</label>
                        <textarea name="description" class="form-control custom-input" rows="4" placeholder="Detail history background, deity architecture, guide schedules, etc..."></textarea>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex gap-3 mt-4">
                        <a href="/admin/view_temples" class="btn-premium-outline flex-grow-1 py-3 text-center"><i class="fa-solid fa-ban"></i> Cancel</a>
                        <button type="submit" class="btn-premium flex-grow-2 px-5 py-3"><i class="fa-solid fa-circle-check"></i> Add Temple</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-premium text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 DarshanHub Administrator. Confidential & Devoted Workspace.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
