<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Devotee Account - DarshanHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('/static/images/srisailam2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .register-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }
        .strength-meter {
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .strength-bar {
            height: 100%;
            width: 0;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="glass-card p-5 text-center text-dark" data-aos="zoom-in">
            <!-- Logo Section -->
            <a href="/" class="navbar-brand-premium d-inline-flex align-items-center mb-4">
                <i class="fa-solid fa-gopuram me-2 text-warning fs-1"></i>
                <span class="fs-2 text-warning">DarshanHub</span>
            </a>
            
            <h3 class="fw-bold mb-2 text-dark heritage-font">Create Account</h3>
            <p class="text-muted mb-4">Join our devotee network to manage your spiritual trips.</p>

            <form action="/register" method="POST" class="text-start">
                <!-- Name Field -->
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark"><i class="fa-solid fa-user text-warning me-1"></i> Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="name" class="form-control border-start-0 custom-input" placeholder="Devotee's Name" required>
                    </div>
                </div>

                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark"><i class="fa-solid fa-envelope text-warning me-1"></i> Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 custom-input" placeholder="devotee@example.com" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark"><i class="fa-solid fa-lock text-warning me-1"></i> Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control border-start-0 border-end-0 custom-input" placeholder="Create strong password" required>
                        <span class="input-group-text bg-transparent border-start-0 text-muted cursor-pointer" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="mt-2">
                        <div class="strength-meter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <span class="small text-muted mt-1 d-block" id="strengthText">Password Strength</span>
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" class="btn-premium w-100 py-3 mt-3 mb-3"><i class="fa-solid fa-user-plus"></i> Complete Registration</button>
            </form>

            <div class="mt-4 pt-3 border-top border-light">
                <p class="text-muted mb-0">Already registered? <a href="/login" class="text-warning text-decoration-none fw-semibold">Login Here</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        
        togglePassword.addEventListener('click', function (e) {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // Password Strength Indicator
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const val = passwordInput.value;
            let strength = 0;
            
            if (val.length >= 6) strength++;
            if (val.match(/[A-Z]/)) strength++;
            if (val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;

            if (val.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.innerText = 'Password Strength';
                strengthText.className = 'small text-muted mt-1 d-block';
            } else if (strength <= 1) {
                strengthBar.style.width = '25%';
                strengthBar.style.backgroundColor = '#dc3545'; // red
                strengthText.innerText = 'Weak Password';
                strengthText.className = 'small text-danger mt-1 d-block';
            } else if (strength === 2) {
                strengthBar.style.width = '50%';
                strengthBar.style.backgroundColor = '#ffc107'; // orange
                strengthText.innerText = 'Moderate Password';
                strengthText.className = 'small text-warning mt-1 d-block';
            } else if (strength === 3) {
                strengthBar.style.width = '75%';
                strengthBar.style.backgroundColor = '#17a2b8'; // blue
                strengthText.innerText = 'Strong Password';
                strengthText.className = 'small text-info mt-1 d-block';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.style.backgroundColor = '#28a745'; // green
                strengthText.innerText = 'Very Strong Password';
                strengthText.className = 'small text-success mt-1 d-block';
            }
        });
    </script>
</body>
</html>
