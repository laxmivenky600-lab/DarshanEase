<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - DarshanHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('/static/images/tirumala5.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .feedback-container {
            max-width: 550px;
            width: 100%;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="feedback-container">
        <div class="glass-card p-5 text-center text-dark" data-aos="zoom-in">
            <!-- Logo Section -->
            <a href="/" class="navbar-brand-premium d-inline-flex align-items-center mb-4">
                <i class="fa-solid fa-gopuram me-2 text-warning fs-1"></i>
                <span class="fs-2 text-warning">Feedback System</span>
            </a>
            
            <h3 class="fw-bold mb-2 text-dark heritage-font">Feedback & Reviews</h3>
            <p class="text-muted mb-4">Your reviews help other devotees plan their spiritual trips. Share your experience.</p>

            <form method="POST" class="text-start">
                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-circle-user text-warning me-1"></i> Username / Pilgrim Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 custom-input" placeholder="e.g. Ramesh Reddy" required>
                    </div>
                </div>

                <!-- Temple Name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-gopuram text-warning me-1"></i> Temple Visited</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-church"></i></span>
                        <input type="text" name="temple_name" class="form-control border-start-0 custom-input" placeholder="e.g. Tirumala" required>
                    </div>
                </div>

                <!-- Rating -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-star text-warning me-1"></i> Star Rating (1-5)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-star-half-stroke"></i></span>
                        <select name="rating" class="form-select border-start-0 custom-input" style="appearance: auto;" required>
                            <option value="5">5 Stars (Excellent)</option>
                            <option value="4">4 Stars (Very Good)</option>
                            <option value="3">3 Stars (Good)</option>
                            <option value="2">2 Stars (Average)</option>
                            <option value="1">1 Star (Poor)</option>
                        </select>
                    </div>
                </div>

                <!-- Review Text -->
                <div class="mb-4">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-pen-nib text-warning me-1"></i> Write Review</label>
                    <textarea name="review" class="form-control custom-input" rows="4" placeholder="Detail your darshan queue times, amenities, security, guide coordination..." required></textarea>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-3">
                    <a href="/" class="btn-premium-outline flex-grow-1 py-3 text-center"><i class="fa-solid fa-ban"></i> Cancel</a>
                    <button type="submit" class="btn-premium flex-grow-2 px-5 py-3"><i class="fa-solid fa-paper-plane"></i> Submit Feedback</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
