<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner With Us - DarshanHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('/static/images/tirumala3.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .partner-container {
            max-width: 650px;
            width: 100%;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="partner-container">
        <div class="glass-card p-5 text-center text-dark" data-aos="zoom-in">
            <!-- Logo Section -->
            <a href="/" class="navbar-brand-premium d-inline-flex align-items-center mb-4">
                <i class="fa-solid fa-handshake me-2 text-warning fs-1"></i>
                <span class="fs-2 text-warning">Partner Program</span>
            </a>
            
            <h3 class="fw-bold mb-2 text-dark heritage-font">Partner With Us</h3>
            <p class="text-muted mb-4">List your temple on DarshanHub to offer online Darshans, tickets, and facilities to devotees globally.</p>

            <form method="POST" class="text-start">
                <!-- Temple name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-gopuram text-warning me-1"></i> Temple Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-church"></i></span>
                        <input type="text" name="temple_name" class="form-control border-start-0 custom-input" placeholder="Name of temple authority" required>
                    </div>
                </div>

                <!-- Contact Person & Email -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6 col-12">
                        <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-user text-warning me-1"></i> Contact Person</label>
                        <input type="text" name="person" class="form-control custom-input" placeholder="Authorized representative" required>
                    </div>
                    <div class="col-md-6 col-12">
                        <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-envelope text-warning me-1"></i> Email Address</label>
                        <input type="email" name="email" class="form-control custom-input" placeholder="authority@example.com" required>
                    </div>
                </div>

                <!-- Mobile & State & City -->
                <div class="row g-3 mb-3">
                    <div class="col-md-4 col-12">
                        <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-phone text-warning me-1"></i> Mobile Number</label>
                        <input type="tel" name="mobile" class="form-control custom-input" placeholder="Contact number" required>
                    </div>
                    <div class="col-md-4 col-6">
                        <label class="form-label fw-semibold text-dark">State</label>
                        <input type="text" name="state" class="form-control custom-input" placeholder="e.g. Andhra Pradesh">
                    </div>
                    <div class="col-md-4 col-6">
                        <label class="form-label fw-semibold text-dark">City</label>
                        <input type="text" name="city" class="form-control custom-input" placeholder="e.g. Vijayawada">
                    </div>
                </div>

                <!-- Temple Address -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-location-dot text-warning me-1"></i> Temple Address</label>
                    <textarea name="address" class="form-control custom-input" rows="2" placeholder="Full postal address of the temple complex"></textarea>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label fw-semibold text-dark"><i class="fa-solid fa-info text-warning me-1"></i> Brief Description / History</label>
                    <textarea name="description" class="form-control custom-input" rows="3" placeholder="Provide details about main deity, heritage background, daily pilgrims visit, services offered..."></textarea>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-3">
                    <a href="/" class="btn-premium-outline flex-grow-1 py-3 text-center"><i class="fa-solid fa-ban"></i> Cancel</a>
                    <button type="submit" class="btn-premium flex-grow-2 px-5 py-3"><i class="fa-solid fa-paper-plane"></i> Submit Inquiry</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
