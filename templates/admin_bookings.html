<!DOCTYPE html>
<html>
<head>
    <title>All Bookings</title>
</head>
<body>

<h2>All Temple Bookings</h2>

<table border="1" cellpadding="8">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Mobile</th>
    <th>Temple</th>
    <th>Date</th>
    <th>Tickets</th>
    <th>Payment</th>
    <th>Action</th>
</tr>

{% for booking in bookings %}
<tr>
    <td>{{ booking[0] }}</td>
    <td>{{ booking[1] }}</td>
    <td>{{ booking[2] }}</td>
    <td>{{ booking[3] }}</td>
    <td>{{ booking[4] }}</td>
    <td>{{ booking[5] }}</td>
    <td>{{ booking[6] }}</td>
    <td>{{ booking[7] }}</td>
<td>
    <a href="/approve/{{ booking[0] }}">Approve</a> |
    <a href="/reject/{{ booking[0] }}">Reject</a>
</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/admin">
    <button>Back</button>
</a>

</body>
</html>
