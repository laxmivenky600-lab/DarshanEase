<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - DarshanHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('/static/images/ainavilli2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .forgot-container {
            max-width: 480px;
            width: 100%;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="forgot-container">
        <div class="glass-card p-5 text-center text-dark" data-aos="zoom-in">
            <!-- Logo Section -->
            <a href="/" class="navbar-brand-premium d-inline-flex align-items-center mb-4">
                <i class="fa-solid fa-gopuram me-2 text-warning fs-1"></i>
                <span class="fs-2 text-warning">DarshanHub</span>
            </a>
            
            <h3 class="fw-bold mb-2 text-dark heritage-font">Reset Password</h3>
            <p class="text-muted mb-4">Enter registered email and choose a new password.</p>

            <form method="POST" class="text-start">
                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark"><i class="fa-solid fa-envelope text-warning me-1"></i> Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 custom-input" placeholder="Enter your registered email" required>
                    </div>
                </div>

                <!-- New Password Field -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark"><i class="fa-solid fa-lock text-warning me-1"></i> New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="new_password" name="new_password" class="form-control border-start-0 border-end-0 custom-input" placeholder="Enter new password" required>
                        <span class="input-group-text bg-transparent border-start-0 text-muted cursor-pointer" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" class="btn-premium w-100 py-3 mb-3"><i class="fa-solid fa-key"></i> Update Password</button>
            </form>

            <div class="mt-4 pt-3 border-top border-light">
                <a href="/login" class="text-warning text-decoration-none fw-semibold"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#new_password');
        
        togglePassword.addEventListener('click', function (e) {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
