<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .profile-card{
            max-width:550px;
            margin:60px auto;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 0 18px rgba(0,0,0,.15);
        }

        .avatar{
            width:100px;
            height:100px;
            border-radius:50%;
            background:#ffc107;
            color:white;
            font-size:45px;
            font-weight:bold;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:20px;
        }

        h2{
            color:#ff9800;
            text-align:center;
            margin-bottom:25px;
        }

        .info-box{
            background:#fafafa;
            padding:15px;
            border-radius:10px;
            margin-bottom:18px;
            border-left:5px solid orange;
        }

        .label{
            font-weight:bold;
            color:#666;
        }

        .value{
            font-size:18px;
            color:#222;
        }

        .btn-warning{
            width:100%;
            margin-top:20px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="profile-card">

        <div class="avatar">
            {{ user[0][0]|upper }}
        </div>

        <h2>👤 My Profile</h2>

        <div class="info-box">
            <div class="label">Full Name</div>
            <div class="value">{{ user[0] }}</div>
        </div>

        <div class="info-box">
            <div class="label">Email Address</div>
            <div class="value">{{ user[1] }}</div>
        </div>

        <div class="info-box">
            <div class="label">Account Status</div>
            <div class="value text-success">Active User ✅</div>
        </div>

        <div class="info-box">
            <div class="label">Member Of</div>
            <div class="value">DarshanHub Devotee</div>
        </div>

        <a href="/dashboard" class="btn btn-warning">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
