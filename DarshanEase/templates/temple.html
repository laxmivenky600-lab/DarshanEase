<!DOCTYPE html>
<html>

<head>
    <title>Temple List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

    <div class="bg-warning text-white text-center py-4 mb-5">
        <h1 class="fw-bold">🛕 Temple List</h1>
    </div>

    <div class="container">

        <h2 class="text-center mb-5">Select a Temple</h2>

        <div class="row">

            {% for temple in temples %}

            <div class="col-md-3 col-sm-6 mb-4">

                <div class="card shadow text-center p-3 h-100">

                    <a href="/book/{{ temple[0] }}"
                       class="btn btn-warning fw-bold">
                        {{ temple[1] }}
                    </a>

                    <br>

                    <a href="{{ url_for('temple_reviews', temple_name=temple[1]) }}">
    ⭐ View Reviews
</a>

<br><br>

<a href="{{ url_for('temple_gallery', temple_name=temple[1]) }}"
   class="btn btn-info btn-sm">
    🖼 Temple Gallery
</a>
                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
