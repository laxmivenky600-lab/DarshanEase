<!DOCTYPE html>
<html>

<head>
    <title>{{ temple_name }} Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-warning mb-4">
    
        🛕 {{ temple_name }} Gallery
    </h2>

    {% if gallery_images %}

    <div id="gallery" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

        <div class="carousel-inner">

            {% for image in gallery_images %}

            <div class="carousel-item {% if loop.first %}active{% endif %}">

                <img src="{{ url_for('static', filename=image) }}"
                     class="d-block w-100 rounded shadow"
                     style="height:600px; object-fit:contain; background:white;">

            </div>

            {% endfor %}

        </div>

        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#gallery"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon bg-dark rounded-circle"></span>

        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#gallery"
                data-bs-slide="next">

            <span class="carousel-control-next-icon bg-dark rounded-circle"></span>

        </button>

    </div>

    {% else %}

    <h3 class="text-center text-danger">
        No Images Available
    </h3>

    {% endif %}

    <div class="text-center mt-4">

        <a href="/temples" class="btn btn-warning">
            ← Back
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
