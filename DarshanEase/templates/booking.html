<!DOCTYPE html>
<html>
<head>
    <title>Book Temple Ticket</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>DarshanHub</h1>
</header>

<div class="container">

    <h2>Temple Ticket Booking</h2>

<form action="/payment" method="POST">

        <input type="text"
               name="name"
               placeholder="Full Name"
               required><br><br>

        <input type="email"
               name="email"
               placeholder="Email"
               required><br><br>

        <input type="text"
               name="mobile"
               placeholder="Mobile Number"
               required><br><br>

       <label>Temple</label><br>

<input type="text"
       name="temple"
       value="{{ temple }}"
       readonly>

<br><br>

        <input type="date"
               name="date"
               required>

        <br><br>

        <input type="number"
               name="tickets"
               min="1"
               max="10"
               placeholder="Number of Tickets"
               required>

        <br><br>

        <button type="submit">
            Book Ticket
        </button>

    </form>

    <br>

    <a href="/dashboard">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
