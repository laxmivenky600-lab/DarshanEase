<!DOCTYPE html>
<html>
<head>
    <title>All Temples</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        🛕 All Temples
    </h2>

    <table class="table table-bordered table-hover">

        <tr class="table-warning">
            <th>ID</th>
            <th>Temple</th>
            <th>State</th>
            <th>City</th>
            <th>Description</th>
            <th>Opening</th>
            <th>Closing</th>
            <th>Contact</th>
            <th>Action</th>
        </tr>

        {% for temple in temples %}

        <tr>
            <td>{{ temple[0] }}</td>
            <td>{{ temple[1] }}</td>
            <td>{{ temple[2] }}</td>
            <td>{{ temple[3] }}</td>
            <td>{{ temple[4] }}</td>
            <td>{{ temple[5] }}</td>
            <td>{{ temple[6] }}</td>
            <td>{{ temple[8] }}</td>

            <td>

                <a href="/admin/edit_temple/{{ temple[0] }}"
                   class="btn btn-warning btn-sm">
                    ✏ Edit
                </a>

                <br><br>

                <a href="/admin/delete_temple/{{ temple[0] }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">
                    🗑 Delete
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <a href="/admin" class="btn btn-secondary">
        ← Back
    </a>

</div>

</body>
</html>
