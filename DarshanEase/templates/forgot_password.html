<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .card{
            margin-top:80px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            color:#ff9800;
            font-weight:bold;
        }

        .btn-warning{
            width:100%;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    Forgot Password
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your registered email"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>New Password</label>

                        <input
                            type="password"
                            name="new_password"
                            class="form-control"
                            placeholder="Enter new password"
                            required>
                    </div>

                    <button type="submit" class="btn btn-warning">
                        Update Password
                    </button>

                </form>

                <hr>

                <div class="text-center">

                    <a href="/login">
                        Back to Login
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
