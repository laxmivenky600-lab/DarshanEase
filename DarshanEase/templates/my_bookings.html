<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>DarshanHub</h1>
</header>

<div class="container">

    <h2>My Temple Bookings</h2>

   <table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Temple</th>
    <th>Date</th>
    <th>Tickets</th>
    <th>Payment Status</th>
    <th>Action</th>
</tr>

{% for booking in bookings %}
<tr>
    <td>{{ booking[0] }}</td>
    <td>{{ booking[1] }}</td>
    <td>{{ booking[2] }}</td>
    <td>{{ booking[3] }}</td>
    <td>{{ booking[4] }}</td>
    <td>{{ booking[5] }}</td>
    <td>
        <a href="/cancel_booking/{{ booking[0] }}">
            <button>Cancel</button>
        </a>
        <a href="/download_ticket/{{ booking[0] }}">
            <button>Download Ticket</button>
</a>
    </td>
</tr>
{% endfor %}

</table>

    <br><br>

    <a href="/dashboard">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
